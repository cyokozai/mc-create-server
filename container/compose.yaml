services:
  mc-create:
    container_name: ${CONTAINER_NAME}
    restart: always
    stdin_open: true
    tty: true
    image: itzg/minecraft-server:latest
    env_file:
      - .env
      - secret.env
    environment:
      TZ: Asia/Tokyo
      EULA: "TRUE"

      # --- Server Type ---
      # Fabric を使う理由: Create MOD は Forge/Fabric 専用で Paper (プラグイン) では動作しない
      # Paper (TYPE: PAPER) は Bukkit プラグイン専用
      TYPE: FABRIC
      VERSION: "1.21.1"
      FABRIC_LOADER_VERSION: "0.16.9"

      # --- MOD 自動管理 (Modrinth から起動時に自動ダウンロード) ---
      # スラッグまたはプロジェクト ID で指定。改行区切りで複数指定可能。
      # バージョン固定例: "create-fabric:0.5.1-f-build.1417+mc1.21.1"
      MODRINTH_PROJECTS: |
        create-fabric
        fabric-api
      MODRINTH_DEFAULT_VERSION_TYPE: release

      # --- Server Settings ---
      DIFFICULTY: normal
      ONLINE_MODE: "TRUE"
      MAX_PLAYERS: 20
      ALLOW_FLIGHT: "TRUE"
      VIEW_DISTANCE: "10"
      MEMORY: ${SERVER_MEMORY:-8G}

      # --- RCON (バックアップサービスが save/stop 操作するために必要) ---
      ENABLE_RCON: "TRUE"
      RCON_PORT: "25575"
      RCON_PASSWORD: ${RCON_PASSWORD}

    ports:
      - "25565:25565/tcp"
      - "25565:25565/udp"
    dns:
      - ${LOCAL_DNS:-8.8.8.8}
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./minecraft/data:/data
      - ./minecraft/mods:/data/mods        # 手動追加 MOD 用 (任意)
      - ./image/server-icon.png:/data/server-icon.png
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    deploy:
      resources:
        limits:
          cpus: "7.0"
          memory: 32G

  backup:
    image: itzg/mc-backup:latest
    restart: unless-stopped
    depends_on:
      - mc-create
    env_file:
      - .env
      - secret.env
    environment:
      TZ: Asia/Tokyo
      BACKUP_NAME: "${CONTAINER_NAME}-backup"
      BACKUP_INTERVAL: 12h
      BACKUP_METHOD: tar
      BACKUP_ON_STARTUP: "TRUE"
      PRUNE_BACKUPS_DAYS: "5"
      PAUSE_IF_NO_PLAYERS: "TRUE"
      PLAYERS_ONLINE_CHECK_INTERVAL: 5m
      INITIAL_DELAY: 2m
      RCON_HOST: localhost
      RCON_PORT: "25575"
      RCON_PASSWORD: ${RCON_PASSWORD}
      SERVER_HOST: ${SERVER_HOST_NAME:-localhost}
      CRON_SCHEDULE: "0 12 * * *"
      DEST_DIR: /backups
      LINK_LATEST: "false"
      TAR_COMPRESS_METHOD: gzip
      ZSTD_PARAMETERS: "-3 --long=25 --single-thread"
    volumes:
      - ./minecraft/data:/data:ro
      - ./minecraft/backups:/backups
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    network_mode: "service:mc-create"
