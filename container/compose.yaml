services:
  mc-create:
    container_name: ${CONTAINER_NAME}
    restart: always
    stdin_open: true
    tty: true
    image: itzg/minecraft-server:latest
    env_file:
      - .env
      - secret.env
    environment:
      TZ: Asia/Tokyo
      EULA: "TRUE"

      # --- Server Type ---
      TYPE: NEOFORGE
      VERSION: "1.21.1"

      # --- Server Settings ---
      DIFFICULTY: hard
      ONLINE_MODE: "TRUE"
      MAX_PLAYERS: 50
      ALLOW_FLIGHT: "TRUE"
      VIEW_DISTANCE: "30"
      MEMORY: ${SERVER_MEMORY:-8G}

      # --- RCON ---
      ENABLE_RCON: "TRUE"
      RCON_PORT: "25575"
      
      # --- MOD maintenance (Modrinth) ---
      MODRINTH_PROJECTS: |
        create
        sgtveinminer
        emi
        load-my-chunks
        architectury-api
        particle-core
        fzzy-config
        kotlin-for-forge
        immediatelyfast
      MODRINTH_DEFAULT_VERSION_TYPE: release
      
      # --- MOD maintenance (CurseForge) ---
      CURSEFORGE_FILES: |
        32274  # = JourneyMap
    ports:
      - "25565:25565/tcp"
      - "25565:25565/udp"
    dns:
      - ${LOCAL_DNS:-8.8.8.8}
      - 1.1.1.1
    volumes:
      - ./minecraft/data:/data
      - ./minecraft/mods:/data/mods
      - ./image/server-icon.png:/data/server-icon.png
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    deploy:
      resources:
        limits:
          cpus: "7.5"
          memory: 20G

  backup:
    image: itzg/mc-backup:latest
    restart: unless-stopped
    depends_on:
      - mc-create
    env_file:
      - .env
      - secret.env
    environment:
      TZ: Asia/Tokyo
      BACKUP_NAME: "${CONTAINER_NAME}-backup"
      BACKUP_METHOD: tar
      BACKUP_ON_STARTUP: "TRUE"
      PRUNE_BACKUPS_DAYS: "5"
      CRON_SCHEDULE: "0 12 * * *"
      PAUSE_IF_NO_PLAYERS: "TRUE"
      PLAYERS_ONLINE_CHECK_INTERVAL: 5m
      INITIAL_DELAY: 2m
      RCON_HOST: localhost
      RCON_PORT: "25575"
      SERVER_HOST: ${SERVER_HOST_NAME:-localhost}
      DEST_DIR: /backups
      LINK_LATEST: "false"
      TAR_COMPRESS_METHOD: gzip
    volumes:
      - ./minecraft/data:/data:ro
      - ./minecraft/backups:/backups
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    network_mode: "service:mc-create"
